<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TaskFlow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 680px; margin: 40px auto; padding: 0 20px; color: #333; background: #f5f5f5;
    }
    h1 { color: #2d6a4f; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 0.9em; margin-bottom: 24px; }
    .status { font-size: 0.85em; padding: 4px 10px; border-radius: 12px; display: inline-block; margin-bottom: 20px; }
    .status.ok  { background: #d8f3dc; color: #2d6a4f; }
    .status.err { background: #fdecea; color: #c62828; }
    .error { color: #d32f2f; background: #fdecea; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; display: none; }
    form { display: flex; gap: 8px; margin-bottom: 24px; }
    input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 1em; background: #fff; }
    button { padding: 10px 18px; background: #2d6a4f; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 1em; }
    button:hover { background: #1b4332; }
    .stats { display: flex; gap: 16px; margin-bottom: 20px; font-size: 0.9em; color: #666; }
    #liste { list-style: none; }
    #liste li {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px; margin-bottom: 8px;
      background: #fff; border-radius: 8px; border-left: 3px solid #2d6a4f; transition: opacity 0.2s;
    }
    #liste li.done { opacity: 0.5; border-left-color: #aaa; }
    #liste li.done .title { text-decoration: line-through; }
    .checkbox { width: 20px; height: 20px; border: 2px solid #2d6a4f; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .checkbox.checked { background: #2d6a4f; }
    .checkbox.checked::after { content: "✓"; color: #fff; font-size: 14px; }
    .title { flex: 1; }
    .date { color: #999; font-size: 0.8em; }
    .delete { background: none; border: none; color: #ccc; cursor: pointer; font-size: 1.2em; padding: 0 4px; }
    .delete:hover { color: #e53935; }
    .vide { color: #aaa; font-style: italic; padding: 20px 0; text-align: center; }
  </style>
</head>
<body>
  <h1>📋 TaskFlow</h1>
  <div class="subtitle">Frontend Nginx · API Node.js · Redis</div>
  <div id="status" class="status">Connexion à l'API...</div>
  <div id="error" class="error"></div>

  <form id="form">
    <input id="input" type="text" placeholder="Nouvelle tâche..." autofocus />
    <button type="submit">Ajouter</button>
  </form>

  <div class="stats">
    <span id="stats-total">0 tâches</span>
    <span id="stats-done">0 terminées</span>
  </div>

  <ul id="liste">
    <li class="vide">Chargement...</li>
  </ul>

  <script>
    const API_URL = "http://localhost:3001";
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const listeEl = document.getElementById("liste");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const statsTotal = document.getElementById("stats-total");
    const statsDone = document.getElementById("stats-done");

    function showError(msg) { errorEl.textContent = msg; errorEl.style.display = "block"; }
    function hideError() { errorEl.style.display = "none"; }
    function formatDate(iso) { return new Date(iso).toLocaleString("fr-FR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" }); }

    async function loadTasks() {
      try {
        const res = await fetch(`${API_URL}/tasks`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const tasks = await res.json();
        hideError();
        statusEl.textContent = "API connectée ✓";
        statusEl.className = "status ok";

        const total = tasks.length;
        const done = tasks.filter(t => t.completed).length;
        statsTotal.textContent = `${total} tâche${total > 1 ? "s" : ""}`;
        statsDone.textContent = `${done} terminée${done > 1 ? "s" : ""}`;
        
        if (total === 0) {
          listeEl.innerHTML = '<li class="vide">Aucune tâche — ajoute la première !</li>';
          return;
        }

        listeEl.innerHTML = tasks.map(t => `
          <li class="${t.completed ? "done" : ""}">
            <div class="checkbox ${t.completed ? "checked" : ""}" onclick="toggleTask('${t.id}')"></div>
            <span class="title">${t.title}</span>
            <span class="date">${formatDate(t.created_at)}</span>
            <button class="delete" onclick="deleteTask('${t.id}')" title="Supprimer">✕</button>
          </li>
        `).join("");
      } catch (err) {
        statusEl.textContent = "API non joignable ✗";
        statusEl.className = "status err";
        showError(`Impossible de joindre l'API sur ${API_URL}/tasks`);
        listeEl.innerHTML = '<li class="vide">Aucune tâche chargée.</li>';
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const title = input.value.trim();
      if (!title) return;
      try {
        const res = await fetch(`${API_URL}/tasks`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        input.value = "";
        await loadTasks();
      } catch (err) { showError(`Erreur lors de l'ajout : ${err.message}`); }
    });

    async function toggleTask(id) {
      try {
        await fetch(`${API_URL}/tasks/${id}`, { method: "PATCH" });
        await loadTasks();
      } catch (err) { showError(`Erreur : ${err.message}`); }
    }

    async function deleteTask(id) {
      try {
        await fetch(`${API_URL}/tasks/${id}`, { method: "DELETE" });
        await loadTasks();
      } catch (err) { showError(`Erreur : ${err.message}`); }
    }

    loadTasks();
  </script>
</body>
</html>
