services:
  database:
    image: postgres:16-alpine
    networks:
      - tp2-network
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    ports:
      - "3000:3000"
    networks:
      - tp2-network
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: 3000
    depends_on:
      database:
        condition: service_healthy 
    restart: on-failure

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    networks:
      - tp2-network
    depends_on:
      - api

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    networks:
      - tp2-network
    environment:
      ADMINER_DEFAULT_SERVER: database
    depends_on:
      - database

volumes:
  db_data:

networks:
  tp2-network:
    driver: bridge